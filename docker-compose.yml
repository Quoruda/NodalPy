services:
  nodalpy:
    image: nodalpy_server:latest
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        - VITE_WS_URL=ws://127.0.0.1:8555/ws
    container_name: nodalpy_server
    ports:
      - "8555:8000"
    volumes:
      - .storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - NODAL_SECRET_KEY=NodalPy_Super_Secret_Key_Change_Me_In_Prod
      - NODAL_DOCKER_NETWORK=nodalpy_network
      - NODAL_KERNEL_IMAGE=nodalpy_server:latest
      - HOST_STORAGE_PATH=${PWD}/.storage
    networks:
      - nodalpy_network
    restart: unless-stopped

networks:
  nodalpy_network:
    name: nodalpy_network

